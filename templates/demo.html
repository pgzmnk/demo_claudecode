<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo — Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 24px;
            color: #111;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }

        .page-header p {
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
        }

        /* ── Form ── */
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 36px 32px;
            margin-bottom: 40px;
        }

        .form-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #333;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.full { grid-column: 1 / -1; }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input, textarea {
            padding: 11px 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #111;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        input::placeholder, textarea::placeholder { color: #bbb; }

        .image-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
            margin-top: 8px;
            border: 2px solid #eee;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        /* ── Cards grid ── */
        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .record-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            animation: pop 0.25s ease;
            position: relative;
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.94) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .record-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            background: #f0f0f0;
        }

        .record-card img.placeholder {
            object-fit: none;
            background: linear-gradient(135deg, #eee, #ddd);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-body { padding: 16px; }
        .card-body h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #111; }
        .card-body p  { font-size: 0.85rem; color: #666; line-height: 1.5; }

        .card-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(0,0,0,0.45);
            color: white;
            border: none;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .card-delete:hover { background: rgba(220,38,38,0.85); }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
        }

        @media (max-width: 540px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>Records</h1>
            <p>Create and manage your cards.</p>
        </div>

        <!-- Create form -->
        <div class="form-card">
            <h2>New record</h2>
            <div class="form-grid">
                <div class="field full">
                    <label for="img-url">Image URL</label>
                    <input type="url" id="img-url" placeholder="https://example.com/photo.jpg" oninput="previewImage(this.value)">
                    <img id="img-preview" class="image-preview" alt="preview">
                </div>
                <div class="field">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g. Sunset in Kyoto">
                </div>
                <div class="field">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="A short description…"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn" onclick="createRecord()">Add record</button>
            </div>
        </div>

        <!-- Cards -->
        <div class="section-label" id="count-label">0 records</div>
        <div class="cards-grid" id="cards-grid">
            <div class="empty-state">No records yet. Create one above.</div>
        </div>
    </div>

    <script>
        let records = [];

        async function load() {
            const res = await fetch('/demo/records');
            records = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('cards-grid');
            const label = document.getElementById('count-label');
            label.textContent = `${records.length} record${records.length !== 1 ? 's' : ''}`;

            if (records.length === 0) {
                grid.innerHTML = '<div class="empty-state">No records yet. Create one above.</div>';
                return;
            }

            grid.innerHTML = records.map(r => `
                <div class="record-card" id="card-${r.id}">
                    ${r.image
                        ? `<img src="${escHtml(r.image)}" alt="${escHtml(r.title)}" onerror="this.src=''; this.style.background='linear-gradient(135deg,#eee,#ddd)';">`
                        : `<img src="" alt="" style="background:linear-gradient(135deg,#eee,#ddd); height:160px;">`}
                    <div class="card-body">
                        <h3>${escHtml(r.title)}</h3>
                        ${r.description ? `<p>${escHtml(r.description)}</p>` : ''}
                    </div>
                    <button class="card-delete" onclick="deleteRecord('${r.id}')" title="Delete">✕</button>
                </div>
            `).join('');
        }

        async function createRecord() {
            const image = document.getElementById('img-url').value.trim();
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();

            if (!title) { highlight('title'); return; }

            const res = await fetch('/demo/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image, title, description })
            });
            const record = await res.json();
            records.unshift(record);
            render();

            document.getElementById('img-url').value = '';
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('img-preview').style.display = 'none';
        }

        async function deleteRecord(id) {
            await fetch(`/demo/records/${id}`, { method: 'DELETE' });
            records = records.filter(r => r.id !== id);
            const el = document.getElementById(`card-${id}`);
            if (el) {
                el.style.transition = 'opacity 0.2s, transform 0.2s';
                el.style.opacity = '0';
                el.style.transform = 'scale(0.9)';
                setTimeout(() => render(), 200);
            } else {
                render();
            }
        }

        function previewImage(url) {
            const img = document.getElementById('img-preview');
            if (url) {
                img.src = url;
                img.style.display = 'block';
                img.onerror = () => { img.style.display = 'none'; };
            } else {
                img.style.display = 'none';
            }
        }

        function highlight(id) {
            const el = document.getElementById(id);
            el.style.borderColor = '#ef4444';
            el.focus();
            setTimeout(() => { el.style.borderColor = ''; }, 1200);
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        load();
    </script>
</body>
</html>
